<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SHA‑256 · glass</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ───────────── TOKENS ───────────── */
    :root {
      --blur: 48px;
      --blur-sm: 20px;

      /* Glass surface — light */
      --glass-bg: rgba(255, 255, 255, 0.38);
      --glass-bg-deep: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.75);
      --glass-border-outer: rgba(255, 255, 255, 0.30);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --glass-shadow-hover: 0 16px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.08);
      --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.0) 60%);

      /* Input glass — light */
      --input-glass: rgba(255, 255, 255, 0.55);
      --input-border: rgba(255, 255, 255, 0.90);
      --input-border-outer: rgba(200, 210, 230, 0.45);
      --input-shadow: inset 0 1px 0 rgba(255,255,255,0.90), inset 0 -1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);
      --input-focus-ring: rgba(0, 122, 255, 0.28);
      --input-focus-border: rgba(0, 122, 255, 0.70);

      /* Button glass — light */
      --btn-glass: rgba(255, 255, 255, 0.50);
      --btn-border: rgba(255, 255, 255, 0.85);
      --btn-shadow: 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.90);
      --btn-hover-glass: rgba(255, 255, 255, 0.70);
      --btn-active-glass: rgba(255, 255, 255, 0.30);

      --text-primary: #1d1d1f;
      --text-secondary: rgba(60, 60, 67, 0.60);
      --text-label: rgba(60, 60, 67, 0.50);
      --accent: #007aff;
      --accent-rgb: 0, 122, 255;
      --success: #28cd41;

      /* Page bg mesh */
      --page-bg: #e8edf5;
      --blob1: #b5c9f5;
      --blob2: #d5c8f0;
      --blob3: #c8e4f5;
      --blob4: #f5d0c8;
    }

    body.dark {
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-bg-deep: rgba(255, 255, 255, 0.11);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-border-outer: rgba(255, 255, 255, 0.06);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30);
      --glass-shadow-hover: 0 16px 48px rgba(0,0,0,0.65), 0 4px 12px rgba(0,0,0,0.40);
      --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.0) 60%);

      --input-glass: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.20);
      --input-border-outer: rgba(255, 255, 255, 0.07);
      --input-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -1px 0 rgba(0,0,0,0.20), 0 2px 8px rgba(0,0,0,0.25);
      --input-focus-ring: rgba(10, 132, 255, 0.30);
      --input-focus-border: rgba(10, 132, 255, 0.80);

      --btn-glass: rgba(255, 255, 255, 0.09);
      --btn-border: rgba(255, 255, 255, 0.18);
      --btn-shadow: 0 2px 8px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.14);
      --btn-hover-glass: rgba(255, 255, 255, 0.15);
      --btn-active-glass: rgba(255, 255, 255, 0.04);

      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(235, 235, 245, 0.55);
      --text-label: rgba(235, 235, 245, 0.45);
      --accent: #0a84ff;
      --accent-rgb: 10, 132, 255;
      --success: #30d158;

      --page-bg: #0d1117;
      --blob1: #1a2744;
      --blob2: #201a38;
      --blob3: #102030;
      --blob4: #2a1a1a;
    }

    /* ───────────── BACKGROUND MESH ───────────── */
    body {
      background: var(--page-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    /* Animated background blobs */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      transition: background 0.4s ease;
    }

    body.dark .blob { opacity: 0.40; }

    .blob-1 {
      width: 520px; height: 520px;
      top: -120px; left: -100px;
      background: var(--blob1);
      animation: float1 18s ease-in-out infinite;
    }
    .blob-2 {
      width: 420px; height: 420px;
      top: 30%; right: -80px;
      background: var(--blob2);
      animation: float2 22s ease-in-out infinite;
    }
    .blob-3 {
      width: 380px; height: 380px;
      bottom: -80px; left: 10%;
      background: var(--blob3);
      animation: float3 26s ease-in-out infinite;
    }
    .blob-4 {
      width: 300px; height: 300px;
      bottom: 10%; right: 20%;
      background: var(--blob4);
      animation: float1 20s ease-in-out infinite reverse;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.06); }
      66%       { transform: translate(-20px, 20px) scale(0.96); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-50px, 30px) scale(1.08); }
      70%       { transform: translate(30px, -20px) scale(0.94); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(60px, -40px) scale(1.10); }
    }

    /* ───────────── CARD ───────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;

      /* Layered glass surface */
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
      border-radius: 36px;
      border: 1px solid var(--glass-border-outer);

      /* Inner white border highlight via outline trick */
      outline: 1px solid var(--glass-border-outer);
      outline-offset: -1px;

      box-shadow: var(--glass-shadow);
      padding: 2.4rem 2.2rem 2.6rem;
      transition: box-shadow 0.3s ease, background 0.4s ease;
      animation: card-appear 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Specular shine layer */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--glass-shine);
      pointer-events: none;
      z-index: 0;
    }

    /* Inner border highlight */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid var(--glass-border);
      pointer-events: none;
      z-index: 0;
    }

    .card:hover {
      box-shadow: var(--glass-shadow-hover);
    }

    @keyframes card-appear {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* all card children above pseudo layers */
    .card > * { position: relative; z-index: 1; }

    /* ───────────── THEME TOGGLE ───────────── */
    .theme-toggle {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 2;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--btn-border);
      background: var(--btn-glass);
      backdrop-filter: blur(var(--blur-sm));
      -webkit-backdrop-filter: blur(var(--blur-sm));
      box-shadow: var(--btn-shadow);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s, color 0.2s, border-color 0.2s;
    }

    .theme-toggle:hover {
      background: var(--btn-hover-glass);
      color: var(--accent);
    }

    .theme-toggle:active {
      transform: scale(0.93);
      background: var(--btn-active-glass);
    }

    /* ───────────── HEADING ───────────── */
    h1 {
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 2.2rem;
      margin-top: 0.2rem;
      transition: color 0.3s;
    }

    /* ───────────── LABELS ───────────── */
    .field { margin-bottom: 1.6rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-label);
      margin-bottom: 0.55rem;
      transition: color 0.3s;
    }

    /* ───────────── GLASS INPUTS ───────────── */
    .input-wrapper { position: relative; }

    input {
      width: 100%;
      padding: 0.85rem 1.05rem;
      font-size: 1.05rem;
      font-family: inherit;
      font-weight: 400;
      letter-spacing: 0.01em;

      background: var(--input-glass);
      backdrop-filter: blur(var(--blur-sm)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--blur-sm)) saturate(160%);
      border: 1px solid var(--input-border-outer);
      border-radius: 20px;
      box-shadow: var(--input-shadow);
      color: var(--text-primary);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
    }

    input:focus {
      border-color: var(--input-focus-border);
      box-shadow: var(--input-shadow),
                  0 0 0 3.5px var(--input-focus-ring);
    }

    input::placeholder {
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ───────────── RESULT GROUP ───────────── */
    .result-group {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .result-group .input-wrapper { flex: 1; }

    .hash-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.55rem;
    }

    .hash-header label { margin-bottom: 0; }

    .copy-feedback {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--success);
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.01em;
    }

    .copy-feedback.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ───────────── ACTION BUTTONS ───────────── */
    .inline-actions { display: flex; gap: 0.3rem; }

    .action-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid var(--btn-border);
      background: var(--btn-glass);
      backdrop-filter: blur(var(--blur-sm));
      -webkit-backdrop-filter: blur(var(--blur-sm));
      box-shadow: var(--btn-shadow);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s, color 0.2s, border-color 0.2s;
    }

    .action-btn:hover {
      background: var(--btn-hover-glass);
      color: var(--accent);
    }

    .action-btn:active {
      transform: scale(0.92);
      background: var(--btn-active-glass);
    }

    .action-btn.copied { color: var(--success) !important; }

    /* ───────────── DIVIDER ───────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--glass-border) 30%,
        var(--glass-border) 70%,
        transparent 100%);
      margin: 0.4rem 0 2rem;
      opacity: 0.6;
    }

    /* ───────────── FOOTNOTE ───────────── */
    .footnote {
      margin-top: 1.4rem;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-label);
      transition: color 0.3s;
    }

    /* ───────────── RESPONSIVE ───────────── */
    @media (max-width: 480px) {
      body { overflow: auto; }
      .card { padding: 1.8rem 1.4rem 2rem; border-radius: 28px; }
      h1 { font-size: 1.7rem; margin-top: 0.5rem; }
    }
  </style>
</head>
<body>
  <!-- Animated mesh background -->
  <div class="bg-layer" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="card">
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar modo claro/oscuro">
      <i class="far fa-moon" id="themeIcon"></i>
    </button>

    <h1>SHA‑256</h1>

    <div class="field">
      <label for="secretInput">Contraseña</label>
      <div class="input-wrapper">
        <input
          type="password"
          id="secretInput"
          placeholder="Escribe algo…"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <div class="field">
      <div class="hash-header">
        <label for="hashOutput">Hash SHA‑256</label>
        <span class="copy-feedback" id="copyFeedback">¡Copiado!</span>
      </div>

      <div class="result-group">
        <div class="input-wrapper">
          <input type="password" id="hashOutput" readonly placeholder=" " value="">
        </div>
        <div class="inline-actions">
          <button class="action-btn" id="toggleVisibilityBtn" title="Mostrar / ocultar hash" aria-label="Mostrar u ocultar hash">
            <i class="far fa-eye" id="eyeIcon"></i>
          </button>
          <button class="action-btn" id="copyHashBtn" title="Copiar al portapapeles" aria-label="Copiar hash SHA‑256">
            <i class="far fa-copy"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="footnote">· en tiempo real ·</div>
  </div>

  <script>
    (function () {
      "use strict";

      /* ── THEME ── */
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon   = document.getElementById('themeIcon');

      function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        themeIcon.className = dark ? 'far fa-sun' : 'far fa-moon';
      }

      const saved = localStorage.getItem('sha256-theme');
      if (saved) {
        applyTheme(saved === 'dark');
      } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
      }

      themeToggle.addEventListener('click', () => {
        const isDark = !document.body.classList.contains('dark');
        applyTheme(isDark);
        localStorage.setItem('sha256-theme', isDark ? 'dark' : 'light');
      });

      /* ── SHA-256 ── */
      const secretInput  = document.getElementById('secretInput');
      const hashOutput   = document.getElementById('hashOutput');
      const toggleBtn    = document.getElementById('toggleVisibilityBtn');
      const eyeIcon      = document.getElementById('eyeIcon');
      const copyBtn      = document.getElementById('copyHashBtn');
      const copyFeedback = document.getElementById('copyFeedback');

      let hashVisible = false;

      async function computeSHA256(message) {
        try {
          const encoder    = new TextEncoder();
          const data       = encoder.encode(message);
          const hashBuffer = await crypto.subtle.digest('SHA-256', data);
          const hashArray  = Array.from(new Uint8Array(hashBuffer));
          return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        } catch (e) {
          console.error('Error SHA-256:', e);
          return '';
        }
      }

      async function updateHash() {
        const val = secretInput.value;
        hashOutput.value = val ? await computeSHA256(val) : '';
      }

      secretInput.addEventListener('input', updateHash);

      window.addEventListener('DOMContentLoaded', () => {
        if (secretInput.value) updateHash();
        eyeIcon.className = 'far fa-eye';
      });

      toggleBtn.addEventListener('click', e => {
        e.preventDefault();
        hashVisible = !hashVisible;
        hashOutput.type    = hashVisible ? 'text' : 'password';
        eyeIcon.className  = hashVisible ? 'far fa-eye-slash' : 'far fa-eye';
      });

      let feedbackTimer = null;

      function showCopyFeedback() {
        if (feedbackTimer) clearTimeout(feedbackTimer);
        copyFeedback.classList.add('show');
        copyBtn.classList.add('copied');
        feedbackTimer = setTimeout(() => {
          copyFeedback.classList.remove('show');
          copyBtn.classList.remove('copied');
          feedbackTimer = null;
        }, 1500);
      }

      async function copyHashToClipboard() {
        const val = hashOutput.value;
        if (!val) return;
        try {
          await navigator.clipboard.writeText(val);
          showCopyFeedback();
        } catch (_) {
          const ta = document.createElement('textarea');
          ta.value = val;
          Object.assign(ta.style, { position: 'fixed', opacity: '0' });
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); showCopyFeedback(); }
          catch (e) { alert('No se pudo copiar. Selecciona el hash manualmente.'); }
          document.body.removeChild(ta);
        }
      }

      copyBtn.addEventListener('click', e => {
        e.preventDefault();
        copyHashToClipboard();
      });
    })();
  </script>
</body>
</html>
